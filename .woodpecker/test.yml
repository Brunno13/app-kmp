when:
  - event: push
    branch: main

labels:
  platform: darwin/arm64

steps:
  # =========================================================
  # NOTIFICAÇÃO DE INÍCIO
  # =========================================================
  - name: notify-start
    image: bash
    commands:
      - |
        TIMESTAMP="$(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M')"
        curl -fsS \
          --connect-timeout 5 \
          --max-time 10 \
          --output /dev/null \
          -X POST \
          "http://192.168.31.215:8095/message?token=A6vmGBx46fXa5Iv" \
          -F "title=WoodpeckerCI" \
          -F "message=WoodpeckerCI · App-KMP · Staging pipeline started · $${TIMESTAMP}" \
          -F "priority=5" \
          || true

  # =========================================================
  # FASE 1: VALIDAÇÃO E TESTES (VIA SCRIPTS)
  # =========================================================
  - name: testar-codigo
    image: bash
    commands:
      - echo "🔧 Dando permissão de execução aos scripts e Gradle..."
      - chmod +x ./gradlew
      - chmod +x ./scripts/*.sh

      - echo "🧹 Verificando Formatação e Linter..."
      - ./scripts/lint.sh

      - echo "🧪 Executando a suíte de testes (Comum, Android e iOS)..."
      - ./scripts/test.sh

  # =========================================================
  # NOTIFICAÇÕES FINAIS
  # =========================================================
  - name: notify-success
    image: bash
    commands:
      - |
        TIMESTAMP="$(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M')"
        curl -fsS \
          --connect-timeout 5 \
          --max-time 10 \
          --output /dev/null \
          -X POST \
          "http://192.168.31.215:8095/message?token=A6vmGBx46fXa5Iv" \
          -F "title=WoodpeckerCI" \
          -F "message=WoodpeckerCI · App-KMP · Staging pipeline finished successfully · $${TIMESTAMP}" \
          -F "priority=5" \
          || true
    when:
      - event: push
        branch: main
        status: [success]

  - name: notify-error
    image: bash
    commands:
      - |
        TIMESTAMP="$(TZ=America/Sao_Paulo date '+%d/%m/%Y %H:%M')"
        curl -fsS \
          --connect-timeout 5 \
          --max-time 10 \
          --output /dev/null \
          -X POST \
          "http://192.168.31.215:8095/message?token=A6vmGBx46fXa5Iv" \
          -F "title=WoodpeckerCI" \
          -F "message=WoodpeckerCI · App-KMP · Staging pipeline failed · $${TIMESTAMP}" \
          -F "priority=8" \
          || true
    when:
      - event: push
        branch: main
        status: [failure]